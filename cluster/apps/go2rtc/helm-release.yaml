---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: go2rtc
  namespace: go2rtc
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 2.2.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s-helm-charts
        namespace: flux-system
      interval: 15m
  values:
    defaultPodOptions:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/master
                    operator: NotIn
                    values:
                      - "true"
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/alexxit/go2rtc
              tag: "v1.9.4"
              pullPolicy: IfNotPresent
            env:
              TZ: Europe/Paris
              NVR_USERNAME:
                secretKeyRef:
                  name: go2rtc-secrets
                  key: NVR_USERNAME
              NVR_PASSWORD:
                secretKeyRef:
                  name: go2rtc-secrets
                  key: NVR_PASSWORD
            resources:
              requests:
                memory: 128Mi
                cpu: 200m
              limits:
                memory: 512Mi
                cpu: 500m
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 1984
                  initialDelaySeconds: 10
                  periodSeconds: 30
                  failureThreshold: 3
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: 1984
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  failureThreshold: 3
    service:
      main:
        enabled: true
        controller: main
        type: ClusterIP
        ports:
          http:
            enabled: true
            port: 1984
            protocol: HTTP
      lb:
        enabled: true
        controller: main
        type: LoadBalancer
        loadBalancerIP: "${SVC_GO2RTC_ADDR}"
        externalTrafficPolicy: Local
        ports:
          api:
            port: 1984
            protocol: TCP
          webrtc-tcp:
            port: 8555
            protocol: TCP
    ingress:
      main:
        enabled: true
        ingressClassName: "traefik"
        annotations:
          traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
          traefik.ingress.kubernetes.io/router.middlewares: networking-forwardauth-authelia@kubernetescrd
          cert-manager.io/cluster-issuer: "letsencrypt-production"
        hosts:
          - host: "go2rtc.${SECRET_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
                service:
                  name: main
        tls:
          - hosts:
              - "go2rtc.${SECRET_DOMAIN}"
            secretName: go2rtc-tls-secret
    persistence:
      config:
        enabled: true
        type: configMap
        name: go2rtc-config
        globalMounts:
          - path: /config/go2rtc.yaml
            subPath: go2rtc.yaml

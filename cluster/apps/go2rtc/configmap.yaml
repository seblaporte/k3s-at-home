---
apiVersion: v1
kind: ConfigMap
metadata:
  name: go2rtc-config
  namespace: go2rtc
data:
  go2rtc.yaml: |
    api:
      listen: ":1984"

    webrtc:
      listen: ":8555/tcp"
      candidates:
        - 192.168.1.37:8555

    streams:
      devant_garage:
        - rtsp://${NVR_USERNAME}:${NVR_PASSWORD}@192.168.1.3:554/Streaming/Channels/101
      devant_garage_low:
        - rtsp://${NVR_USERNAME}:${NVR_PASSWORD}@192.168.1.3:554/Streaming/Channels/102
      appentis:
        - rtsp://${NVR_USERNAME}:${NVR_PASSWORD}@192.168.1.3:554/Streaming/Channels/201
      appentis_low:
        - rtsp://${NVR_USERNAME}:${NVR_PASSWORD}@192.168.1.3:554/Streaming/Channels/202
      derriere:
        - rtsp://${NVR_USERNAME}:${NVR_PASSWORD}@192.168.1.3:554/Streaming/Channels/301
      derriere_low:
        - rtsp://${NVR_USERNAME}:${NVR_PASSWORD}@192.168.1.3:554/Streaming/Channels/302
      garage:
        - rtsp://${NVR_USERNAME}:${NVR_PASSWORD}@192.168.1.3:554/Streaming/Channels/401
      garage_low:
        - rtsp://${NVR_USERNAME}:${NVR_PASSWORD}@192.168.1.3:554/Streaming/Channels/402
      sejour:
        - rtsp://${NVR_USERNAME}:${NVR_PASSWORD}@192.168.1.3:554/Streaming/Channels/501
      sejour_low:
        - rtsp://${NVR_USERNAME}:${NVR_PASSWORD}@192.168.1.3:554/Streaming/Channels/502
      facade_maison:
        - rtsp://${NVR_USERNAME}:${NVR_PASSWORD}@192.168.1.3:554/Streaming/Channels/601
      facade_maison_low:
        - rtsp://${NVR_USERNAME}:${NVR_PASSWORD}@192.168.1.3:554/Streaming/Channels/602

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kitchenvault-cookidoo
  namespace: kitchenvault
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 2.2.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s-helm-charts
        namespace: flux-system
      interval: 15m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    defaultPodOptions:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/master
                    operator: NotIn
                    values:
                      - "true"
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/seblaporte/kitchenvault/cookidoo-service
              tag: "manual"
              pullPolicy: Always
            env:
              COOKIDOO_COUNTRY_CODE: "fr"
              COOKIDOO_LANGUAGE: "fr-FR"
              COOKIDOO_EMAIL:
                secretKeyRef:
                  name: kitchenvault-secrets
                  key: COOKIDOO_EMAIL
              COOKIDOO_PASSWORD:
                secretKeyRef:
                  name: kitchenvault-secrets
                  key: COOKIDOO_PASSWORD
            probes:
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8001
                  initialDelaySeconds: 15
                  periodSeconds: 10
                  failureThreshold: 5
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /health
                    port: 8001
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  failureThreshold: 3
            resources:
              requests:
                memory: 128Mi
                cpu: 50m
              limits:
                memory: 256Mi
                cpu: 200m
    service:
      main:
        enabled: true
        controller: main
        ports:
          http:
            enabled: true
            port: 8001
            protocol: TCP
    persistence:
      data:
        enabled: true
        storageClass: "synology-iscsi-storage"
        accessMode: ReadWriteOnce
        size: 1Gi
        globalMounts:
          - path: /data

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: slskd
  namespace: slskd
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 2.2.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s-helm-charts
        namespace: flux-system
      interval: 15m
  values:
    defaultPodOptions:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: node-role.kubernetes.io/master
                operator: NotIn
                values:
                - "true"
    controllers:
      main:
        initContainers:
          init-config:
            image:
              repository: public.ecr.aws/docker/library/busybox
              tag: latest@sha256:1487d0af5f52b4ba31c7e465126ee2123fe3f2305d638e7827681e7cf6c83d5e
              pullPolicy: IfNotPresent
            command:
              - "/bin/sh"
              - "-c"
              - "mkdir -p /app && chown -R 1000:1000 /app"
            volumeMounts:
              - name: app
                mountPath: /app
          init-migrate-config:
            image:
              repository: mikefarah/yq
              tag: "4.53.3"
              pullPolicy: IfNotPresent
            command:
              - "/bin/sh"
              - "-c"
              - |
                CONFIG=/app/slskd.yml
                if [ ! -f "$CONFIG" ]; then
                  echo "No config file found, skipping migration"
                  exit 0
                fi
                NEEDS_MIGRATION=$(yq 'has("global") or has("groups")' "$CONFIG")
                if [ "$NEEDS_MIGRATION" = "true" ]; then
                  echo "Migrating slskd config: moving global/groups under transfers key"
                  yq -i '
                    if has("global") then .transfers.global = .global | del(.global) else . end |
                    if has("groups") then .transfers.groups = .groups | del(.groups) else . end
                  ' "$CONFIG"
                  echo "Migration complete"
                else
                  echo "Config already in correct format, skipping migration"
                fi
            volumeMounts:
              - name: app
                mountPath: /app
        containers:
          main:
            image:
              repository: slskd/slskd
              tag: "0.25.1"
              pullPolicy: IfNotPresent
            env:
              TZ: Europe/Paris
              SLSKD_SHARED_DIR: /data/media/music
              SLSKD_REMOTE_CONFIGURATION: true
            securityContext:
              runAsUser: 1000
              runAsGroup: 1000
              fsGroup: 1000
            resources:
              requests:
                memory: 256Mi
                cpu: 250m
              limits:
                memory: 265Mi
                cpu: 250m
            probes:
              startup:
                spec:
                  initialDelaySeconds: 0
                  timeoutSeconds: 1
                  periodSeconds: 5
                  failureThreshold: 60
    service:
      main:
        enabled: true
        controller: main
        ports:
          http:
            enabled: true
            port: 5030
            protocol: HTTP
      shared:
        enabled: true
        controller: main
        type: LoadBalancer
        loadBalancerIP: "${SVC_SLSKD_ADDR}"
        externalTrafficPolicy: Local
        ports:
          soulseek:
            enabled: true
            port: 50300
            protocol: TCP
    ingress:
      main:
        enabled: true
        ingressClassName: "traefik"
        annotations:
          traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
          traefik.ingress.kubernetes.io/router.middlewares: networking-forwardauth-authelia@kubernetescrd
          cert-manager.io/cluster-issuer: "letsencrypt-production"
        hosts:
          - host: "slskd.${SECRET_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
                service:
                  name: main
        tls:
          - hosts:
              - "slskd.${SECRET_DOMAIN}"
            secretName: slskd-tls-secret
    persistence:
      app:
        enabled: true
        storageClass: "synology-iscsi-storage"
        accessMode: "ReadWriteOnce"
        size: "5Gi"
      data:
        type: nfs
        server: 192.168.1.10
        path: /volume1/media

---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kitchenvault-backend
  namespace: kitchenvault
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 2.2.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s-helm-charts
        namespace: flux-system
      interval: 15m
  values:
    defaultPodOptions:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/master
                    operator: NotIn
                    values:
                      - "true"
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/seblaporte/kitchenvault
              tag: "manual"
              pullPolicy: Always
            env:
              KITCHENVAULT_CORS_ALLOWED_ORIGINS: "https://kitchenvault.${SECRET_DOMAIN}"
              SPRING_DATASOURCE_URL: "jdbc:postgresql://kitchenvault-postgresql:5432/kitchenvault"
              SPRING_DATASOURCE_USERNAME: "kitchenvault"
              SPRING_DATASOURCE_PASSWORD:
                secretKeyRef:
                  name: kitchenvault-secrets
                  key: postgres-user-password
              OVH_AI_ENDPOINTS_ACCESS_TOKEN:
                secretKeyRef:
                  name: kitchenvault-secrets
                  key: ovh-ai-endpoints-access-token
              COOKIDOO_SERVICE_URL: "http://kitchenvault-cookidoo:8001"
            resources:
              requests:
                memory: 256Mi
                cpu: 100m
              limits:
                memory: 768Mi
                cpu: 500m
            probes:
              liveness:
                enabled: true
                spec:
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  timeoutSeconds: 5
                  failureThreshold: 5
              readiness:
                enabled: true
                spec:
                  initialDelaySeconds: 10
                  periodSeconds: 10
                  timeoutSeconds: 3
                  failureThreshold: 3
    service:
      main:
        enabled: true
        controller: main
        ports:
          http:
            enabled: true
            port: 8080
            protocol: TCP

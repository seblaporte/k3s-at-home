---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kitchenvault-frontend
  namespace: kitchenvault
spec:
  interval: 5m
  chart:
    spec:
      chart: app-template
      version: 2.2.0
      sourceRef:
        kind: HelmRepository
        name: bjw-s-helm-charts
        namespace: flux-system
      interval: 15m
  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
      remediateLastFailure: true
  values:
    defaultPodOptions:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/master
                    operator: NotIn
                    values:
                      - "true"
    controllers:
      main:
        containers:
          main:
            image:
              repository: ghcr.io/seblaporte/kitchenvault/frontend
              tag: "manual"
              pullPolicy: Always
            env:
              BACKEND_URL: "http://kitchenvault-backend:8080"
            resources:
              requests:
                memory: 64Mi
                cpu: 25m
              limits:
                memory: 128Mi
                cpu: 100m
    service:
      main:
        enabled: true
        controller: main
        ports:
          http:
            enabled: true
            port: 80
            protocol: TCP
    ingress:
      main:
        enabled: true
        ingressClassName: "traefik"
        annotations:
          traefik.ingress.kubernetes.io/router.entrypoints: "websecure"
          traefik.ingress.kubernetes.io/router.middlewares: networking-forwardauth-authelia@kubernetescrd
          cert-manager.io/cluster-issuer: "letsencrypt-production"
        hosts:
          - host: "kitchenvault.${SECRET_DOMAIN}"
            paths:
              - path: /
                pathType: Prefix
                service:
                  name: main
        tls:
          - hosts:
              - "kitchenvault.${SECRET_DOMAIN}"
            secretName: kitchenvault-tls-secret

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: mosquitto-secure-config
  namespace: mosquitto
data:
  mosquitto.conf: |
    listener 8883
    protocol mqtt

    certfile /mosquitto/certs/tls.crt
    keyfile /mosquitto/certs/tls.key
    require_certificate false

    allow_anonymous false
    password_file /mosquitto/passwd/passwd

    persistence true
    persistence_location /mosquitto/data/

    log_dest stdout
    log_type error warning notice information
